services:

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: flowscribe_backend
    ports:
      - "8502:8502"
    volumes:
      - ../product_created:/app/product_created
    env_file:
      - ../.env

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: flowscribe_frontend
    command: streamlit run app/frontend/dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - backend
    env_file:
      - ../.env